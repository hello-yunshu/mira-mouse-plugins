name: Sync Mira Lock
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag: { description: 'Published release tag', required: true, type: string }
permissions: { contents: read }
concurrency:
  group: mira-lock-sync-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false
jobs:
  lock-sync:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'plugin/') ||
      startsWith(github.event.release.tag_name, 'release/')
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    environment: plugin-release
    env:
      RELEASE_TAG: "${{ github.event.release.tag_name || inputs.release_tag }}"
      MIRA_REPOSITORY: "${{ vars.MIRA_REPOSITORY || 'hello-yunshu/mira-mouse' }}"
      MIRA_APP_TOKEN: "${{ secrets.MIRA_APP_TOKEN }}"
    steps:
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - name: Verify credentials
        id: credentials
        run: |
          set -euo pipefail
          test -n "$MIRA_REPOSITORY"
          if test -n "$MIRA_APP_TOKEN"; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v7
        if: steps.credentials.outputs.has_token == 'true'
        with:
          repository: '${{ env.MIRA_REPOSITORY }}'
          token: '${{ env.MIRA_APP_TOKEN }}'
          path: mira-app
          ref: main
      - run: rustup toolchain install stable --profile minimal
        if: steps.credentials.outputs.has_token == 'true'
      - name: Cache Rust dependencies
        if: steps.credentials.outputs.has_token == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ github.workspace }}/mira-app
      - name: Update Mira plugin lock for all bundled plugins
        if: steps.credentials.outputs.has_token == 'true'
        id: update
        working-directory: mira-app
        run: |
          set -euo pipefail
          cargo run --package xtask -- plugins update-lock \
            --release-tag "$RELEASE_TAG" \
            --repository "$GITHUB_REPOSITORY"
      - name: Validate Mira lock update
        if: steps.credentials.outputs.has_token == 'true'
        working-directory: mira-app
        run: |
          set -euo pipefail
          npm ci --legacy-peer-deps
          npm run check:structured
          cargo run --package xtask -- plugins check-lock
          cargo run --package xtask -- plugins sync --locked --offline
          npm run check:plugin-contract
      - name: Commit Mira lock update
        if: steps.credentials.outputs.has_token == 'true'
        working-directory: mira-app
        env:
          RELEASE_TAG: '${{ env.RELEASE_TAG }}'
          # 锁文件同步是机械变更，且上游已有独立验证步骤（check:structured、
          # check-lock、sync、check:plugin-contract）。跳过 mira 仓库的
          # pre-push hook，避免本地工具链兼容性问题阻塞自动同步。
          MIRA_SKIP_HOOKS: '1'
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add plugins.lock.json src-tauri/tauri.conf.json
          git diff --cached --quiet && {
            echo 'No changes to commit; lock is already up to date.'
            exit 0
          }
          git commit -m "chore(plugins): sync $RELEASE_TAG"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Skip Mira sync without token
        if: steps.credentials.outputs.has_token != 'true'
        run: echo 'MIRA_APP_TOKEN is not configured; plugin release and registry publication remain official, but the Mira app lock was not updated.' >> "$GITHUB_STEP_SUMMARY"

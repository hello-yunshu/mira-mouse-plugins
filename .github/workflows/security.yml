name: Plugin Security
on:
  push: { branches: [main], paths: ['plugins/**', 'registry/**', '.github/workflows/**', 'package.json', 'deny.toml'] }
  pull_request: { paths: ['plugins/**', 'registry/**', '.github/workflows/**', 'package.json', 'deny.toml'] }
  schedule: [{ cron: '41 3 * * 1' }]
permissions: { contents: read, security-events: write }
concurrency: { group: 'plugin-security-${{ github.ref }}', cancel-in-progress: true }
jobs:
  codeql:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 peeled commit
        with: { languages: 'javascript-typescript,actions' }
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 peeled commit
  policy:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm run validate && npm test


# SPDX-License-Identifier: CC0-1.0
# Unified plugin release workflow.
# Packs and signs all production-ready plugins into a single GitHub Release.
# Downstream registry publication and Mira lock sync are handled by
# publish-registry.yml and sync-mira.yml (triggered by the release event).
name: Plugin Release
on:
  workflow_dispatch:
    inputs:
      overwrite_latest:
        description: 'Overwrite latest release (rebuild without version bump)'
        required: false
        default: 'true'
        type: boolean
      release_tag:
        description: 'Tag to create (required when overwrite_latest is false, e.g. release/v2026-06-26)'
        required: false
        type: string
permissions:
  contents: read
  actions: write
  id-token: write
  attestations: write
concurrency:
  group: "plugin-release-${{ inputs.release_tag || 'overwrite' }}"
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      plugins: '${{ steps.list.outputs.plugins }}'
      plugins_count: '${{ steps.list.outputs.plugins_count }}'
      release_tag: '${{ steps.list.outputs.release_tag }}'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm run validate && npm test
      - id: list
        name: Enumerate releasable plugins
        env:
          GH_TOKEN: '${{ github.token }}'
          OVERWRITE: "${{ inputs.overwrite_latest == true }}"
          INPUT_TAG: '${{ inputs.release_tag }}'
        run: |
          set -euo pipefail
          # A plugin is releasable when its manifest evidence is hardware-verified.
          # This excludes fixture-verified (example-mock) plugins.
          plugins_json="$(node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "plugins";
            const result = [];
            for (const name of fs.readdirSync(dir).sort()) {
              const manifestPath = path.join(dir, name, "plugin.json");
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              if (manifest.evidence === "hardware-verified") {
                result.push({ dir: name, pluginId: manifest.pluginId, version: manifest.version });
              }
            }
            console.log(JSON.stringify(result));
          ')"
          echo "plugins=$plugins_json" >> "$GITHUB_OUTPUT"
          plugins_count=$(printf '%s' "$plugins_json" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>console.log(JSON.parse(s).length))')
          echo "plugins_count=$plugins_count" >> "$GITHUB_OUTPUT"
          if [ "$OVERWRITE" = "true" ]; then
            release_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            test -n "$release_tag" || { echo "No existing release to overwrite"; exit 1; }
          else
            release_tag="$INPUT_TAG"
            test -n "$release_tag" || { echo "release_tag input is required when overwrite_latest is false"; exit 1; }
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "### Releasable plugins" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$plugins_json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  signed-package:
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment: plugin-release
    strategy:
      fail-fast: false
      matrix:
        plugin: '${{ fromJson(needs.gate.outputs.plugins) }}'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Pack and sign plugin
        env:
          PLUGIN_SIGNING_KEY: '${{ secrets.PLUGIN_SIGNING_KEY }}'
          PLUGIN_KEY_ID: 'mira-plugins-2026-001'
          PLUGIN_DIR: '${{ matrix.plugin.dir }}'
        run: |
          set -euo pipefail
          plugin_id="${{ matrix.plugin.pluginId }}"
          version="${{ matrix.plugin.version }}"
          asset="${plugin_id//./-}-${version}.mira-plugin"
          mkdir -p dist
          node scripts/pack-sign.mjs "plugins/$PLUGIN_DIR" "dist/$asset"
          sha256sum "dist/$asset" | awk '{print $1}' > "dist/$asset.sha256"
          echo "asset=$asset" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-${{ matrix.plugin.dir }}
          path: dist/*
          if-no-files-found: error

  create-release:
    needs: [gate, signed-package]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: plugin-*
          merge-multiple: true
      - name: Verify all expected assets present
        env:
          EXPECTED: '${{ needs.gate.outputs.plugins_count }}'
        run: |
          set -euo pipefail
          echo "Downloaded assets:"
          ls -la dist/
          actual=$(find dist -name '*.mira-plugin' | wc -l | tr -d ' ')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "Asset count mismatch: expected $EXPECTED, got $actual. Refusing to touch release." >&2
            exit 1
          fi
          echo "Asset count OK: $actual/$EXPECTED"
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'
      - name: Create unified release
        env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ needs.gate.outputs.release_tag }}'
          TARGET: '${{ github.sha }}'
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; cleaning existing assets before upload."
            # overwrite 模式下 gh release upload --clobber 只覆盖同名文件，删不掉改了版本的旧产物（如 0.7.0→0.7.2）
            # 先删掉 release 现有所有资产，再上传本次构建结果，保证 release 永远只反映最新一次构建
            existing_assets=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
            if [ -n "$existing_assets" ]; then
              printf '%s\n' "$existing_assets" | xargs -P 4 -I {} gh release delete-asset "$TAG" {} --repo "$GITHUB_REPOSITORY" --yes
            fi
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/* --target "$TARGET" \
              --title "Mira Plugins $TAG" \
              --notes "Unified signed Mira plugin release bundle.

          This release contains all production-ready plugins built from tag $TAG.
          Each plugin asset is individually signed with the Ed25519 production key.
          SHA-256 checksums and build provenance attestations are attached."
          fi
      - name: Dispatch downstream metadata sync
        env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ needs.gate.outputs.release_tag }}'
        run: |
          set -euo pipefail
          gh workflow run publish-registry.yml --repo "$GITHUB_REPOSITORY" \
            -f release_tag="$TAG"
          gh workflow run sync-mira.yml --repo "$GITHUB_REPOSITORY" \
            -f release_tag="$TAG"

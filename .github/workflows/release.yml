# SPDX-License-Identifier: CC0-1.0
# Unified plugin release workflow.
# Packs and signs all production-ready plugins into a single GitHub Release.
# Downstream registry publication and Mira lock sync are handled by
# publish-registry.yml and sync-mira.yml (triggered by the release event).
name: Plugin Release
on:
  push:
    tags: ['release/v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to create (e.g. release/v2026-06-26)'
        required: true
        type: string
permissions:
  contents: read
  id-token: write
  attestations: write
concurrency:
  group: 'plugin-release-${{ github.ref_name || inputs.release_tag }}'
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      plugins: '${{ steps.list.outputs.plugins }}'
      release_tag: '${{ steps.list.outputs.release_tag }}'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: npm run validate && npm test
      - id: list
        name: Enumerate releasable plugins
        run: |
          set -euo pipefail
          # A plugin is releasable when its manifest evidence is hardware-verified.
          # This excludes fixture-verified (example-mock) and inferred (razer-viper) plugins.
          plugins_json="$(node -e '
            const fs = require("fs");
            const path = require("path");
            const dir = "plugins";
            const result = [];
            for (const name of fs.readdirSync(dir).sort()) {
              const manifestPath = path.join(dir, name, "plugin.json");
              if (!fs.existsSync(manifestPath)) continue;
              const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
              if (manifest.evidence === "hardware-verified") {
                result.push({ dir: name, pluginId: manifest.pluginId, version: manifest.version });
              }
            }
            console.log(JSON.stringify(result));
          ')"
          echo "plugins=$plugins_json" >> "$GITHUB_OUTPUT"
          release_tag="${{ github.ref_name || inputs.release_tag }}"
          test -n "$release_tag"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "### Releasable plugins" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$plugins_json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  signed-package:
    needs: gate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment: plugin-release
    strategy:
      fail-fast: false
      matrix:
        plugin: '${{ fromJson(needs.gate.outputs.plugins) }}'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Pack and sign plugin
        env:
          PLUGIN_SIGNING_KEY: '${{ secrets.PLUGIN_SIGNING_KEY }}'
          PLUGIN_KEY_ID: 'mira-plugins-2026-001'
          PLUGIN_DIR: '${{ matrix.plugin.dir }}'
        run: |
          set -euo pipefail
          plugin_id="${{ matrix.plugin.pluginId }}"
          version="${{ matrix.plugin.version }}"
          asset="${plugin_id//./-}-${version}.mira-plugin"
          mkdir -p dist
          node scripts/pack-sign.mjs "plugins/$PLUGIN_DIR" "dist/$asset"
          sha256sum "dist/$asset" | awk '{print $1}' > "dist/$asset.sha256"
          echo "asset=$asset" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: plugin-${{ matrix.plugin.dir }}
          path: dist/*
          if-no-files-found: error

  create-release:
    needs: [gate, signed-package]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: plugin-*
          merge-multiple: true
      - name: Verify all expected assets present
        run: |
          set -euo pipefail
          echo "Downloaded assets:"
          ls -la dist/
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v3 peeled commit
        with:
          subject-path: 'dist/*'
      - name: Create unified release
        env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ needs.gate.outputs.release_tag }}'
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets."
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --verify-tag \
              --title "Mira Plugins $TAG" \
              --notes "Unified signed Mira plugin release bundle.

          This release contains all production-ready plugins built from tag $TAG.
          Each plugin asset is individually signed with the Ed25519 production key.
          SHA-256 checksums and build provenance attestations are attached."
          fi

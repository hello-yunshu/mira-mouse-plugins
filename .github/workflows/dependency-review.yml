name: Plugin Dependency Review
on: pull_request
permissions: { contents: read }
jobs:
  review:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with: { fail-on-severity: high, deny-licenses: 'GPL-2.0-only,LGPL-2.0-only' }


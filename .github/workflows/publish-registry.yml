# SPDX-License-Identifier: CC0-1.0
name: Publish Plugin Registry
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag: { description: 'Published release tag', required: true, type: string }
permissions:
  contents: write
concurrency:
  group: plugin-registry
  cancel-in-progress: false
jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'plugin/') ||
      startsWith(github.event.release.tag_name, 'release/')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with: { ref: main }
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - name: Download and verify all published packages
        env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ github.event.release.tag_name || inputs.release_tag }}'
          REPO: '${{ github.repository }}'
        run: |
          set -euo pipefail
          mkdir -p release-asset
          gh release download "$TAG" --repo "$REPO" --dir release-asset \
            --pattern '*.mira-plugin' --pattern '*.mira-plugin.sha256'
          # Verify checksums for every asset
          for asset in release-asset/*.mira-plugin; do
            checksum="$asset.sha256"
            test -f "$asset" && test -f "$checksum"
            expected="$(tr -d '[:space:]' < "$checksum")"
            actual="$(sha256sum "$asset" | awk '{print $1}')"
            test "$expected" = "$actual"
            unzip -p "$asset" plugin.json > "$asset.plugin.json"
          done
          echo "Verified $(find release-asset -name '*.mira-plugin' | wc -l) plugin assets"
      - name: Fetch asset URLs from release
        env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ github.event.release.tag_name || inputs.release_tag }}'
          REPO: '${{ github.repository }}'
        run: |
          set -euo pipefail
          gh api "repos/$REPO/releases/tags/$TAG" --jq '.assets[] | select(.name | endswith(".mira-plugin")) | .browser_download_url + " " + .name' > release-asset/asset-urls.txt
          cat release-asset/asset-urls.txt
      - name: Update registry for all plugins
        env:
          RELEASE_TAG: '${{ github.event.release.tag_name || inputs.release_tag }}'
        run: |
          set -euo pipefail
          batch=$(node -e '
            const fs = require("fs");
            const lines = fs.readFileSync("release-asset/asset-urls.txt", "utf8").trim().split("\n").filter(Boolean);
            const items = lines.map(line => {
              const [url, name] = line.split(" ");
              const asset = "release-asset/" + name;
              const sha256 = fs.readFileSync(asset + ".sha256", "utf8").replace(/\s/g, "");
              console.error("Collecting " + name + " ...");
              return { url, manifest: asset + ".plugin.json", sha256 };
            });
            process.stdout.write(JSON.stringify(items));
          ')
          node scripts/update-registry.mjs registry/index.json --batch "$batch"
      - run: npm run validate && npm test
      - name: Commit immutable registry metadata
        env:
          TAG: '${{ github.event.release.tag_name || inputs.release_tag }}'
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add registry/index.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(registry): publish $TAG"
          git push origin HEAD:main

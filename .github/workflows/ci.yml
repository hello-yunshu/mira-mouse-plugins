name: Plugin CI
on:
  pull_request:
  push: { branches: [main] }
permissions: { contents: read }
concurrency: { group: 'plugin-ci-${{ github.ref }}', cancel-in-progress: true }
jobs:
  validate-and-fixtures:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      - run: node scripts/sync-hidpp-features.mjs --check
      - run: npm run validate
      - run: npm test
      - run: npm run check:architecture
      - name: Reject forbidden content
        run: |
          set -euo pipefail
          test -z "$(find plugins -type l -print -quit)"
          if find plugins -type f | grep -E '\.(exe|dll|dylib|so|wasm|html|css|js|ts|py|sh|bat|cmd|pyc)$'; then
            exit 1
          fi
          if find . -path './.git' -prune -o -type f -print | grep -E '(^|/)(\.research|dist)/'; then
            exit 1
          fi
      - run: echo 'Offline tests are fixture-verified only; they do not establish hardware support.' >> "$GITHUB_STEP_SUMMARY"
  platform-parse:
    strategy: { fail-fast: false, matrix: { os: [windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - shell: bash
        run: |
          find plugins registry -name '*.json' -print0 | xargs -0 node -e "const fs=require('fs'); for (const f of process.argv.slice(1)) { try { JSON.parse(fs.readFileSync(f)); } catch (e) { console.error(f + ': ' + e.message); process.exit(1); } }"
  # 第 3.7 节：删除 auto-release job。
  # 插件发布必须通过 workflow_dispatch 手动触发 release.yml，创建不可覆盖的
  # per-plugin Release（plugin/<plugin-id>/v<semver>）。push 到 main 不得自动
  # 触发覆盖式发布，否则会违反“Release 不可覆盖”与“插件独立发布”规则。
  # CI 仍负责 validate / test / architecture lint，确保 main 始终可发布。

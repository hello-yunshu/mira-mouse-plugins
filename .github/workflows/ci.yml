name: Plugin CI
on:
  pull_request:
  push: { branches: [main] }
permissions: { contents: read }
concurrency: { group: 'plugin-ci-${{ github.ref }}', cancel-in-progress: true }
jobs:
  validate-and-fixtures:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: node scripts/sync-hidpp-features.mjs --check
      - run: npm run validate
      - run: npm test
      - name: Reject forbidden content
        run: |
          set -euo pipefail
          test -z "$(find plugins -type l -print -quit)"
          if find plugins -type f | grep -E '\.(exe|dll|dylib|so|wasm|html|css|js|ts|py|sh|bat|cmd|pyc)$'; then
            exit 1
          fi
          if find . -path './.git' -prune -o -type f -print | grep -E '(^|/)(\.research|dist)/'; then
            exit 1
          fi
      - run: echo 'Offline tests are fixture-verified only; they do not establish hardware support.' >> "$GITHUB_STEP_SUMMARY"
  platform-parse:
    strategy: { fail-fast: false, matrix: { os: [windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - shell: bash
        run: |
          find plugins registry -name '*.json' -print0 | xargs -0 node -e "const fs=require('fs'); for (const f of process.argv.slice(1)) { try { JSON.parse(fs.readFileSync(f)); } catch (e) { console.error(f + ': ' + e.message); process.exit(1); } }"
  auto-release:
    needs: [validate-and-fixtures, platform-parse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      actions: write
    concurrency:
      group: plugin-auto-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - name: Determine release action
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Collect current hardware-verified plugin asset names
          current=$(node -e '
            const fs = require("fs");
            const path = require("path");
            const result = [];
            for (const name of fs.readdirSync("plugins").sort()) {
              const m = path.join("plugins", name, "plugin.json");
              if (!fs.existsSync(m)) continue;
              const manifest = JSON.parse(fs.readFileSync(m, "utf8"));
              if (manifest.evidence === "hardware-verified") {
                const asset = manifest.pluginId.replace(/\./g, "-") + "-" + manifest.version + ".mira-plugin";
                result.push(asset);
              }
            }
            console.log(JSON.stringify(result));
          ')
          echo "Current assets: $current"
          latest_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$latest_tag" ]; then
            tag="release/v$(date -u +%Y-%m-%d)"
            echo "action=new" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "No previous release; creating $tag"
          else
            published=$(gh release view "$latest_tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '[.assets[].name | select(endswith(".mira-plugin"))]')
            need_new=$(node -e "
              const current = new Set($current);
              const published = new Set($published);
              const changed = current.size !== published.size || [...current].some(a => !published.has(a));
              console.log(changed ? 'yes' : 'no');
            ")
            if [ "$need_new" = "yes" ]; then
              tag="release/v$(date -u +%Y-%m-%d)"
              echo "action=new" >> "$GITHUB_OUTPUT"
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              echo "Version changed; creating $tag"
            else
              echo "action=overwrite" >> "$GITHUB_OUTPUT"
              echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"
              echo "Version unchanged; overwriting $latest_tag"
            fi
          fi
      - name: Trigger release workflow
        run: |
          if [ "$ACTION" = "new" ]; then
            gh workflow run release.yml --repo "$GITHUB_REPOSITORY" \
              -f overwrite_latest=false \
              -f release_tag="$TAG"
          else
            gh workflow run release.yml --repo "$GITHUB_REPOSITORY" \
              -f overwrite_latest=true
          fi
        env:
          ACTION: ${{ steps.decide.outputs.action }}
          TAG: ${{ steps.decide.outputs.tag }}
          GH_TOKEN: ${{ github.token }}

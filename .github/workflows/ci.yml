name: Plugin CI
on:
  pull_request:
  push: { branches: [main] }
permissions: { contents: read }
concurrency: { group: 'plugin-ci-${{ github.ref }}', cancel-in-progress: true }
jobs:
  validate-and-fixtures:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22 }
      - run: node scripts/sync-hidpp-features.mjs --check
      - run: npm run validate
      - run: npm test
      - name: Reject forbidden content
        run: |
          set -euo pipefail
          test -z "$(find plugins -type l -print -quit)"
          ! find plugins -type f | grep -E '\.(exe|dll|dylib|so|wasm|html|css|js|ts|py|sh|bat|cmd|pyc)$'
          ! find . -path './.git' -prune -o -type f -print | grep -E '(^|/)(\.research|dist)/'
      - run: echo 'Offline tests are fixture-verified only; they do not establish hardware support.' >> "$GITHUB_STEP_SUMMARY"
  platform-parse:
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - shell: bash
        run: find plugins registry -name '*.json' -print0 | xargs -0 -n1 node -e "JSON.parse(require('fs').readFileSync(process.argv[1]))"


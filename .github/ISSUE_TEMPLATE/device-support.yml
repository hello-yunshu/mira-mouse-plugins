name: Device evidence
description: Submit one exact hardware evidence record
body:
  - type: markdown
    attributes: { value: "Do not submit a full serial number or unredacted diagnostic." }
  - type: input
    id: model
    attributes: { label: Exact model }
    validations: { required: true }
  - type: input
    id: ids
    attributes: { label: VID/PID and interface }
    validations: { required: true }
  - type: input
    id: firmware
    attributes: { label: Firmware }
    validations: { required: true }
  - type: input
    id: connection
    attributes: { label: Connection }
    validations: { required: true }
  - type: input
    id: system
    attributes: { label: Operating system }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Read/write/readback evidence and redacted log }
    validations: { required: true }

